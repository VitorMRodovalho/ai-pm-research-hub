name = "platform"
# Pin the production Cloudflare account so `wrangler deploy` fails fast on a wrong-account
# login instead of half-uploading assets then erroring on a "missing KV" (code 10041).
# SEDIMENT-WRANGLER-ACCOUNT (2026-06-05): prod `platform` + SESSION KV 6ffb04524d66… ("platform-session")
# live under vitor.rodovalho@outlook.com's account 67d4c226…, NOT the personal gmail account
# 4afb554f… (which has 0 KV namespaces). account_id is not a secret (it appears in dashboard URLs).
account_id = "67d4c2262aebde75efb5fb6a1bb12cd2"
main = "@astrojs/cloudflare/entrypoints/server"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# p225 #281 — Cloudflare Browser Rendering binding for forward auto-gen of
# certificate PDFs via /api/internal/cert-pdf-render/[id]. Requires Workers Paid plan.
# See ADR-0098, src/pages/api/internal/cert-pdf-render/[id].ts, migration 20260805000005.
[browser]
binding = "BROWSER"

[assets]
directory = "./dist/client/"

[[kv_namespaces]]
binding = "SESSION"
id = "6ffb04524d664228b19ce1595d08cbc5"

# p151 C — VEP JSON import endpoint (/api/admin/import-pmi-vep-json)
# Public worker URL (non-sensitive). p150 hotfix3: pmi-vep-sync does NOT have
# a custom domain on vitormr.dev — only workers.dev. Using workers.dev domain.
[vars]
PMI_VEP_SYNC_URL = "https://pmi-vep-sync.ai-pm-research-hub.workers.dev"

# Secret required (not in this file — bind via CLI):
#   wrangler secret put INGEST_SHARED_SECRET
# Must match value bound on cloudflare-workers/pmi-vep-sync worker.
# Without it, /api/admin/import-pmi-vep-json returns 500 server_misconfig.
