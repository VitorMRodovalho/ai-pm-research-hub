name: CI Heartbeat Monitor

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  monitor_ci_validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check latest CI Validate run
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const workflow_id = 'ci.yml';
            const branch = 'main';
            const alertTitle = '[CI Monitor] CI Validate failing on main';

            const runsResponse = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id,
              branch,
              event: 'push',
              status: 'completed',
              per_page: 1,
            });

            const latest = runsResponse.data.workflow_runs?.[0];
            if (!latest) {
              core.info('No completed CI Validate runs found yet.');
              core.setOutput('state', 'no_data');
              return;
            }

            core.info(`Latest CI Validate run: ${latest.html_url} (${latest.conclusion})`);
            core.setOutput('latest_run_url', latest.html_url);
            core.setOutput('latest_run_conclusion', String(latest.conclusion || ''));

            const openIssues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              per_page: 100,
            });
            const existingAlert = openIssues.data.find((issue) => issue.title === alertTitle);

            if (latest.conclusion === 'failure') {
              const body = [
                'CI heartbeat detectou falha no workflow `CI Validate` em `main`.',
                '',
                `- Run: ${latest.html_url}`,
                `- SHA: \`${latest.head_sha}\``,
                `- Trigger: \`${latest.event}\``,
                '',
                'Ação sugerida:',
                '1. Abrir logs de `validate` e `browser_guards`.',
                '2. Corrigir e fazer push incremental.',
                '3. Confirmar recuperação no próximo heartbeat.',
              ].join('\n');

              if (existingAlert) {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number: existingAlert.number,
                  body: `Falha ainda ativa no CI.\n\n${body}`,
                });
                core.info(`Updated existing CI alert issue #${existingAlert.number}`);
              } else {
                const created = await github.rest.issues.create({
                  owner,
                  repo,
                  title: alertTitle,
                  body,
                });
                core.info(`Created CI alert issue #${created.data.number}`);
              }

              core.setOutput('state', 'failing');
              return;
            }

            if (existingAlert) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existingAlert.number,
                body: `Heartbeat detectou recuperação do CI Validate.\n\n- Run verde: ${latest.html_url}\n- SHA: \`${latest.head_sha}\``,
              });
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existingAlert.number,
                state: 'closed',
              });
              core.info(`Closed recovered CI alert issue #${existingAlert.number}`);
            }

            core.setOutput('state', 'healthy');

