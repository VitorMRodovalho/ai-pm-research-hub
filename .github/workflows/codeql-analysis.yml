# CodeQL — análise de segurança (S-Audit / Technical Debt)
# Ver: https://docs.github.com/en/code-security/code-scanning
#
# Rodando com upload: false enquanto Code scanning não estiver habilitado no repo.
# Para habilitar alertas na aba Security: Settings → Security → Code scanning → Set up
# Depois, remover upload: false abaixo.

name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  security-events: write
  contents: read
  actions: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          # Sem upload: GitHub rejeita se Code scanning não estiver habilitado.
          # Habilitar em Settings → Security → Code scanning para ativar alertas.
          upload: false
