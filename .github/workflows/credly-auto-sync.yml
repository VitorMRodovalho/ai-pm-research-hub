# S10 — Credly Auto Sync (weekly)
# Invokes sync-credly-all Edge Function to refresh badge data.
# Requires: sync-credly-all deployed; SUPABASE_SERVICE_ROLE_KEY configured (#58).

name: Credly Auto Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"   # Monday 08:00 UTC

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read

jobs:
  sync_credly:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Check secrets (skip if not configured)
        id: check
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Credly sync skipped — configure SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY (#58)"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip notice
        if: steps.check.outputs.skip == 'true'
        run: echo "Skipped — secrets not configured"

      - name: Trigger sync-credly-all
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          URL="${SUPABASE_URL%/}/functions/v1/sync-credly-all"
          echo "Calling: $URL"
          HTTP_CODE=$(curl -sS -o /tmp/credly_sync_resp.json -w "%{http_code}" \
            -X POST "$URL" \
            -H "Content-Type: application/json" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -d '{"triggered_by":"github_actions_cron"}')

          echo "HTTP_CODE=$HTTP_CODE"
          cat /tmp/credly_sync_resp.json || true

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "Credly sync returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Upload response artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: credly-sync-response
          path: /tmp/credly_sync_resp.json
          if-no-files-found: ignore
