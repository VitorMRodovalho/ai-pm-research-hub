name: Schema Invariants (ADR-0012 B10)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # Daily at 07:00 UTC (catches drift introduced outside PR flow, e.g., direct DB edits)
    - cron: '0 7 * * *'
  workflow_dispatch:

concurrency:
  group: invariants-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-invariants:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run schema invariants contract test
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY secret not configured — test will skip gracefully. Configure in repo Settings → Secrets → Actions to enable live-DB drift detection."
          fi
          npm run test:contracts:db

      - name: Summarize result
        if: always()
        run: |
          echo "## Schema Invariants Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -z "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" ]; then
            echo ":warning: Test skipped — \`SUPABASE_SERVICE_ROLE_KEY\` secret not set." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "To enable: repo Settings → Secrets → Actions → New secret" >> $GITHUB_STEP_SUMMARY
            echo "- \`SUPABASE_URL\` = https://ldrfrvwhxsmgaabwmaik.supabase.co" >> $GITHUB_STEP_SUMMARY
            echo "- \`SUPABASE_SERVICE_ROLE_KEY\` = (copy from Supabase dashboard)" >> $GITHUB_STEP_SUMMARY
          else
            echo ":white_check_mark: Invariants verified against live DB." >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "8 invariants checked: A1/A2/A3 (role consistency), B (is_active), C (designations), D (auth_id), E (engagement/member), F (legacy_tribe_id)." >> $GITHUB_STEP_SUMMARY
            echo "See \`supabase/migrations/20260425010000_b10_schema_invariants.sql\` and ADR-0012." >> $GITHUB_STEP_SUMMARY
          fi
