name: CI Validate

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run i18n hardcoded lint gate
        run: npm run lint:i18n

      - name: Run Unit Tests
        # SUPABASE_URL + SUPABASE_SERVICE_ROLE_KEY enable DB-aware contract tests
        # (rpc-migration-coverage Q-C orphan check + drift detection). Without
        # them, the Track Q-C orphan check silently skips (p174 audit sediment).
        # Required GH secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY.
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm test
        
      - name: Build Project
        # Mock env vars satisfy Astro/Vite build-time replacement. URL precisa
        # DNS-resolvable: workerd recente (runner image update ~2026-05-18)
        # aborta com `kj/async-io-unix.c++:1298: DNS lookup failed` em hostname
        # inexistente como `mock.supabase.co`. Issue #220 / BUG-207.C.
        env:
          PUBLIC_SUPABASE_URL: 'http://127.0.0.1:9999'
          PUBLIC_SUPABASE_ANON_KEY: 'mock-key-for-build'
        run: npm run build

      - name: Smoke Test Routes
        env:
          PUBLIC_SUPABASE_URL: 'http://127.0.0.1:9999'
          PUBLIC_SUPABASE_ANON_KEY: 'mock-key-for-build'
        run: npm run smoke:routes
        timeout-minutes: 2

  browser_guards:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run browser guards
        # URL precisa DNS-resolvable (workerd-strict) — ver Build step acima.
        env:
          PUBLIC_SUPABASE_URL: 'http://127.0.0.1:9999'
          PUBLIC_SUPABASE_ANON_KEY: 'mock-key-for-build'
        run: ./scripts/run_browser_guards_with_retry.sh

  visual_dark_mode:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PLAYWRIGHT_BROWSERS_PATH: ~/.cache/ms-playwright
      # URL precisa DNS-resolvable (workerd-strict) — ver browser_guards acima.
      PUBLIC_SUPABASE_URL: 'http://127.0.0.1:9999'
      PUBLIC_SUPABASE_ANON_KEY: 'mock-key-for-build'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run dark mode visual snapshots
        run: npm run test:visual:dark

  quality_gate:
    runs-on: ubuntu-latest
    needs: [validate, browser_guards, visual_dark_mode]
    steps:
      - name: Report gate status
        run: echo "CI quality gate passed (validate + browser_guards + visual_dark_mode)."
