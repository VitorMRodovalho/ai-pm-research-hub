name: Knowledge Insights Auto Sync

on:
  schedule:
    # Weekly: Sunday 05:40 UTC
    - cron: '40 5 * * 0'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Trigger sync-knowledge-insights
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SYNC_KNOWLEDGE_INSIGHTS_SECRET: ${{ secrets.SYNC_KNOWLEDGE_INSIGHTS_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ] || [ -z "${SYNC_KNOWLEDGE_INSIGHTS_SECRET:-}" ]; then
            echo "Missing required secrets: SUPABASE_URL, SUPABASE_ANON_KEY, SYNC_KNOWLEDGE_INSIGHTS_SECRET"
            exit 1
          fi

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${SUPABASE_URL}/functions/v1/sync-knowledge-insights" \
            -H "Content-Type: application/json" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            -H "x-sync-secret: ${SYNC_KNOWLEDGE_INSIGHTS_SECRET}" \
            --data '{"dry_run":false,"triggered_by":"github_cron","days":45,"limit":300,"source":"youtube"}')

          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)

          echo "HTTP ${STATUS}"
          echo "$BODY"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            echo "Sync request failed with HTTP ${STATUS}"
            exit 1
          fi

          echo "$BODY" | grep -q '"success":true' || {
            echo "Sync did not return success=true"
            exit 1
          }
