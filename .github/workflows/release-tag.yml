# Release Tag — manual workflow para criar e enviar tag semântica
# Uso: Actions → Release Tag → Run workflow → informar version (ex: 0.10.0)
name: Release Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (ex: 0.10.0)'
        required: true
        type: string
      message:
        description: 'Tag message'
        required: false
        default: 'Release v%version%'
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          V="${{ inputs.version }}"
          if [[ ! "$V" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[a-z0-9]+)?(\+[a-z0-9]+)?$ ]]; then
            echo "Invalid semver: $V"
            exit 1
          fi

      - name: Verify CI passed on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          RESULT=$(gh run list --workflow ci.yml --branch main --limit 1 --json conclusion --jq '.[0].conclusion')
          if [ "$RESULT" != "success" ]; then
            echo "❌ CI has not passed on main. Latest result: $RESULT"
            exit 1
          fi
          echo "✅ CI passed on main"

      - name: Generate release provenance manifest
        run: |
          node scripts/register-release-provenance.mjs prepare "${{ inputs.version }}"

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.version }}"
          MSG="${{ inputs.message }}"
          MSG="${MSG//%version%/$VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "$MSG"
          git push origin "v${VERSION}"

      - name: Publish GitHub Release with provenance assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.version }}"
          gh release create "v${VERSION}" \
            release-provenance/*.tar.gz \
            release-provenance/MANIFEST.sha256 \
            release-provenance/release-provenance.json \
            --title "v${VERSION}" \
            --notes "Release v${VERSION}. Provenance assets include MANIFEST.sha256 and release-provenance.json."

      - name: Register provenance manifest in OTS-backed registry
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RELEASE_PROVENANCE_DECLARATION_ID: ${{ secrets.RELEASE_PROVENANCE_DECLARATION_ID }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # Calls register_release_provenance_asset; the existing OTS cron anchors the asset later.
          node scripts/register-release-provenance.mjs register "${{ inputs.version }}"
